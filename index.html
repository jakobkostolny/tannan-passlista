<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Räkning bilar över Tännån — passlista</title>
<style>
  :root{
    --paper: #F6F2E7;
    --ink: #2B2B26;
    --ink-soft: #5C5A4F;
    --green: #2F4A38;
    --green-deep: #1E3326;
    --sage: #D8E2CC;
    --sage-line: #A9BC95;
    --orange: #C75A28;
    --orange-deep: #8E3E1B;
    --line: #D8D2C0;
    --card: #FFFDF7;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Sans', Arial, sans-serif;
    line-height:1.5;
    padding-bottom: 4rem;
  }
  @font-face{ }
  .wrap{ max-width: 760px; margin: 0 auto; padding: 0 1.25rem; }

  header.top{
    background: var(--green-deep);
    color: #F1EEE0;
    padding: 2.2rem 1.25rem 2.6rem;
    border-bottom: 6px solid var(--orange);
  }
  header.top .wrap{ position:relative; }
  .eyebrow{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #BFD2B3;
    margin: 0 0 0.5rem;
  }
  h1{
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 2rem;
    margin: 0 0 0.35rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .sub{
    color: #CBD6BE;
    font-size: 0.95rem;
    margin: 0;
    max-width: 46ch;
  }

  .counter-row{
    margin-top: 1.6rem;
    display:flex;
    align-items: center;
    gap: 1rem;
    font-family: 'IBM Plex Mono', monospace;
  }
  .odometer{
    display:flex;
    gap: 3px;
    background: var(--green-deep);
    padding: 4px;
  }
  .digit{
    width: 26px;
    height: 36px;
    background: #11200F;
    color: #C9F0AE;
    font-size: 22px;
    display:flex;
    align-items:center;
    justify-content:center;
    border: 1px solid #0A1607;
  }
  .counter-label{
    font-size: 12px;
    color: #BFD2B3;
    letter-spacing: 0.04em;
  }

  main{ padding-top: 1.75rem; }

  .week{
    margin-bottom: 1.1rem;
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 10px;
    overflow: hidden;
  }
  .week-head{
    width:100%;
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.95rem 1.1rem;
    background: var(--card);
    border: none;
    cursor: pointer;
    text-align:left;
    font-family: inherit;
  }
  .week-head:hover{ background: #FBF8EF; }
  .week-title{
    display:flex;
    align-items:baseline;
    gap: 0.6rem;
  }
  .week-title .label{
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    color: var(--green-deep);
    font-size: 0.95rem;
  }
  .week-title .range{
    color: var(--ink-soft);
    font-size: 0.85rem;
  }
  .week-meta{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .chev{
    transition: transform 0.15s ease;
    color: var(--ink-soft);
    font-size: 0.8rem;
  }
  .week.open .chev{ transform: rotate(90deg); }
  .week-body{
    display:none;
    border-top: 1px solid var(--line);
    padding: 0.4rem 1.1rem 0.9rem;
  }
  .week.open .week-body{ display:block; }

  .day{
    margin: 0.85rem 0;
  }
  .day-head{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: var(--green-deep);
    font-weight: 600;
    margin: 0 0 0.4rem;
    padding-top: 0.6rem;
    border-top: 1px dashed var(--line);
  }
  .day:first-child .day-head{ border-top:none; padding-top:0; }

  .pass-card{
    padding: 0.7rem 0;
    border-bottom: 1px dotted var(--line);
  }
  .pass-card:last-child{ border-bottom:none; }
  .pass-head{
    display:flex;
    align-items:baseline;
    gap: 0.5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: var(--ink-soft);
    margin-bottom: 0.4rem;
  }
  .pass-head .pnr{ color: var(--green-deep); font-weight: 600; }

  .slot-filled{
    background: var(--sage);
    border: 1px solid var(--sage-line);
    border-radius: 8px;
    padding: 0.55rem 0.7rem;
    display:flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.6rem;
    font-size: 0.88rem;
  }
  .slot-filled .name{ font-weight: 700; color: var(--green-deep); display:block; margin-bottom: 0.25rem; }
  .slot-filled .counts{ color: var(--ink-soft); font-size: 0.82rem; line-height: 1.5; }
  .remove-btn{
    background: none;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 0.78rem;
    text-decoration: underline;
    padding: 0;
    font-family: inherit;
    white-space: nowrap;
  }
  .remove-btn:hover{ color: var(--orange-deep); }

  .field-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem 0.6rem;
  }
  .field-grid .field-full{ grid-column: 1 / -1; }
  .field label{
    display:block;
    font-size: 0.75rem;
    color: var(--ink-soft);
    margin-bottom: 0.2rem;
  }
  .field input{
    width:100%;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 0.4rem 0.5rem;
    font-size: 0.9rem;
    font-family: inherit;
    background: #FFFDF7;
  }
  .field input:focus{ outline: 2px solid var(--sage-line); border-color: var(--green); }
  .save-btn{
    background: var(--orange);
    color: #FFF8EF;
    border: none;
    border-radius: 6px;
    padding: 0.45rem 0.9rem;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    margin-top: 0.55rem;
    width:100%;
  }
  .save-btn:hover{ background: var(--orange-deep); }
  .save-btn:disabled{ opacity: 0.45; cursor: default; }

  .status-line{
    text-align:center;
    font-size: 0.8rem;
    color: var(--ink-soft);
    font-family: 'IBM Plex Mono', monospace;
    margin: 1.5rem 0 0;
    min-height: 1.2em;
  }
  .loading{
    text-align:center;
    padding: 3rem 1rem;
    color: var(--ink-soft);
    font-family: 'IBM Plex Mono', monospace;
  }
  footer{
    text-align:center;
    color: var(--ink-soft);
    font-size: 0.78rem;
    margin-top: 2rem;
    padding: 0 1.25rem;
  }
</style>
</head>
<body>

<header class="top">
  <div class="wrap">
    <p class="eyebrow">Fältschema · trafikräkning</p>
    <div class="counter-row">
      <div class="odometer" id="odometer">
        <div class="digit">0</div><div class="digit">0</div><div class="digit">0</div>
      </div>
      <span class="counter-label" id="counterLabel">pass bokade av 210</span>
    </div>
  </div>
</header>

<main class="wrap" id="main">
  <div class="loading" id="loading">Laddar passlistan …</div>
</main>

<p class="status-line" id="statusLine"></p>

<footer>Ändringar sparas direkt och syns för alla som öppnar länken.</footer>

<script>
const WEEKS = [
  { label: "Vecka 27", start: "2026-07-06", end: "2026-07-12" },
  { label: "Vecka 28", start: "2026-07-13", end: "2026-07-19" },
  { label: "Vecka 29", start: "2026-07-20", end: "2026-07-26" },
  { label: "Vecka 30", start: "2026-07-27", end: "2026-08-02" },
  { label: "Vecka 31", start: "2026-08-03", end: "2026-08-09" }
];

const PASSES = [
  { nr: 1, time: "08.30–10.00" },
  { nr: 2, time: "10.00–11.30" },
  { nr: 3, time: "11.30–13.00" },
  { nr: 4, time: "13.00–14.30" },
  { nr: 5, time: "14.30–16.00" },
  { nr: 6, time: "16.00–17.30" }
];

const WEEKDAYS = ["söndag","måndag","tisdag","onsdag","torsdag","fredag","lördag"];
const MONTHS = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];

function parseDate(s){
  const [y,m,d] = s.split("-").map(Number);
  return new Date(y, m-1, d);
}
function addDays(date, n){
  const d = new Date(date);
  d.setDate(d.getDate()+n);
  return d;
}
function fmtKey(date){
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,"0");
  const d = String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
function fmtDisplay(date){
  return `${WEEKDAYS[date.getDay()]} ${date.getDate()} ${MONTHS[date.getMonth()]}`;
}

function buildDays(){
  const weeks = [];
  for(const w of WEEKS){
    const start = parseDate(w.start);
    const end = parseDate(w.end);
    const days = [];
    let cur = start;
    while(cur <= end){
      days.push({ key: fmtKey(cur), display: fmtDisplay(cur) });
      cur = addDays(cur,1);
    }
    weeks.push({ label: w.label, range: `${w.start.slice(8)}–${w.end.slice(8)} ${MONTHS[parseDate(w.end).getMonth()]}`.replace(/^0/,""), days });
  }
  return weeks;
}

const WEEK_DATA = buildDays();
const TOTAL_SLOTS = WEEK_DATA.reduce((a,w)=>a+w.days.length,0) * PASSES.length;

let signups = {};
let openWeekIndex = -1;

function slotKey(dayKey, passNr){ return `${dayKey}__${passNr}`; }

async function loadSignups(){
  try{
    const result = await window.storage.get("tannan-signups", true);
    signups = result && result.value ? JSON.parse(result.value) : {};
  }catch(e){
    signups = {};
  }
}

async function saveSignups(){
  try{
    const result = await window.storage.set("tannan-signups", JSON.stringify(signups), true);
    return !!result;
  }catch(e){
    return false;
  }
}

function setStatus(msg, isError){
  const el = document.getElementById("statusLine");
  el.textContent = msg;
  el.style.color = isError ? "#8E3E1B" : "#5C5A4F";
  if(msg){
    setTimeout(()=>{ if(el.textContent === msg) el.textContent = ""; }, 2500);
  }
}

function updateCounter(){
  const filled = Object.keys(signups).length;
  const digits = String(filled).padStart(3,"0").split("");
  const odo = document.getElementById("odometer");
  odo.innerHTML = digits.map(d=>`<div class="digit">${d}</div>`).join("");
  document.getElementById("counterLabel").textContent = `pass bokade av ${TOTAL_SLOTS}`;
}

function render(){
  const main = document.getElementById("main");
  main.innerHTML = "";

  WEEK_DATA.forEach((week, wi)=>{
    const filledInWeek = week.days.reduce((a,d)=> a + PASSES.filter(p=>signups[slotKey(d.key,p.nr)]).length, 0);
    const totalInWeek = week.days.length * PASSES.length;

    const weekEl = document.createElement("div");
    weekEl.className = "week" + (wi === openWeekIndex ? " open" : "");

    const head = document.createElement("button");
    head.className = "week-head";
    head.innerHTML = `
      <span class="week-title"><span class="label">${week.label}</span><span class="range">${week.range}</span></span>
      <span style="display:flex; align-items:center; gap:0.7rem;">
        <span class="week-meta">${filledInWeek}/${totalInWeek} bokade</span>
        <span class="chev">▶</span>
      </span>`;
    head.addEventListener("click", ()=>{
      openWeekIndex = (openWeekIndex === wi) ? -1 : wi;
      render();
    });

    const body = document.createElement("div");
    body.className = "week-body";

    week.days.forEach(day=>{
      const dayEl = document.createElement("div");
      dayEl.className = "day";

      const dayHead = document.createElement("div");
      dayHead.className = "day-head";
      dayHead.textContent = day.display;
      dayEl.appendChild(dayHead);

      const list = document.createElement("div");
      list.className = "pass-list";

      PASSES.forEach(pass=>{
        const key = slotKey(day.key, pass.nr);
        const entry = signups[key];

        const card = document.createElement("div");
        card.className = "pass-card";

        const head = document.createElement("div");
        head.className = "pass-head";
        head.innerHTML = `<span class="pnr">Pass ${pass.nr}</span><span>${pass.time}</span>`;
        card.appendChild(head);

        const body = document.createElement("div");

        if(entry && entry.name){
          body.innerHTML = `
            <div class="slot-filled">
              <div>
                <span class="name">${escapeHtml(entry.name)}</span>
                <div class="counts">
                  Antal passager: ${entry.passages ? escapeHtml(entry.passages) : "—"}<br>
                  Antal passagerare per bil: ${entry.perCar ? escapeHtml(entry.perCar) : "—"}<br>
                  Antal bussar, tjänstefordon, IDP-fordon: ${entry.buses ? escapeHtml(entry.buses) : "—"}
                </div>
              </div>
              <button class="remove-btn" type="button">ta bort</button>
            </div>`;
          body.querySelector(".remove-btn").addEventListener("click", async ()=>{
            delete signups[key];
            const ok = await saveSignups();
            setStatus(ok ? "Borttaget." : "Kunde inte spara, försök igen.", !ok);
            updateCounter();
            render();
          });
        }else{
          body.innerHTML = `
            <div class="field-grid">
              <div class="field field-full">
                <label>Namn</label>
                <input type="text" class="f-name" placeholder="Ditt namn" maxlength="40">
              </div>
              <div class="field">
                <label>Antal passager</label>
                <input type="text" class="f-passages" inputmode="numeric">
              </div>
              <div class="field">
                <label>Antal passagerare per bil</label>
                <input type="text" class="f-percar" inputmode="numeric">
              </div>
              <div class="field field-full">
                <label>Antal bussar, tjänstefordon, IDP-fordon</label>
                <input type="text" class="f-buses" inputmode="numeric">
              </div>
            </div>
            <button class="save-btn" type="button">Spara</button>`;
          const nameInput = body.querySelector(".f-name");
          const passagesInput = body.querySelector(".f-passages");
          const perCarInput = body.querySelector(".f-percar");
          const busesInput = body.querySelector(".f-buses");
          const btn = body.querySelector(".save-btn");
          const doSave = async ()=>{
            const name = nameInput.value.trim();
            if(!name){ nameInput.focus(); return; }
            btn.disabled = true;
            signups[key] = {
              name,
              passages: passagesInput.value.trim(),
              perCar: perCarInput.value.trim(),
              buses: busesInput.value.trim()
            };
            const ok = await saveSignups();
            if(ok){
              setStatus(`Sparat: ${name} — pass ${pass.nr}, ${day.display}.`, false);
              updateCounter();
              render();
            }else{
              delete signups[key];
              btn.disabled = false;
              setStatus("Kunde inte spara, försök igen.", true);
            }
          };
          btn.addEventListener("click", doSave);
          [nameInput, passagesInput, perCarInput, busesInput].forEach(inp=>{
            inp.addEventListener("keydown", (e)=>{ if(e.key === "Enter") doSave(); });
          });
        }

        card.appendChild(body);
        list.appendChild(card);
      });

      dayEl.appendChild(list);
      body.appendChild(dayEl);
    });

    weekEl.appendChild(head);
    weekEl.appendChild(body);
    main.appendChild(weekEl);
  });
}

function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

async function init(){
  await loadSignups();
  document.getElementById("loading").remove();
  updateCounter();
  render();
}

init();
</script>
</body>
</html>
